<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polygon Donut Wallpaper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #2f5d3a;
      position: relative;
    }

    .logo-container {
      position: absolute;
      inset: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-items: space-around;
      gap: 80px;
      padding: 80px;
      opacity: 0.18;
      pointer-events: none;
    }

    .moving-logo {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 20px;
      object-fit: cover;
      opacity: 0.22;
      animation: none;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      object-fit: cover;
      animation: float 6s ease-in-out infinite;
    }

    .logo:nth-child(even) {
      animation-duration: 8s;
    }

    .logo:nth-child(3n) {
      animation-duration: 10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    .channel-link {
      position: absolute;
      right: 40px;
      bottom: 30px;
      font-size: 56px;
      font-weight: bold;
      color: white;
      text-decoration: none;
      text-shadow: 0 4px 12px rgba(0,0,0,0.4);
      transition: 0.3s;
      z-index: 10;
    }

    .channel-link:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="logo-container" id="logoContainer">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
    <img class="logo" src="https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj" alt="Logo">
      <img class="logo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTm_aiW30pwksZazpRRNJvmg4eHATmNUsXFSg&s" alt="Logo Extra 1">
    <img class="logo" src="https://characterai.io/i/200/static/avatars/uploaded/2023/7/31/-oBDbKx8ZExLsRlZeYBUhQLPkqlvcLrZV23PyA3Qlk8.webp?webp=true&anim=0" alt="Logo Extra 2">
  </div>

  <a
    class="channel-link"
    href="https://www.youtube.com/@PolygonDonut"
    target="_blank"
  >
    Polygon Donut
  </a>

  <script>
    const container = document.getElementById('logoContainer');
    const images = [
      'https://yt3.googleusercontent.com/DmHvvJBynK3q0tbyST6WKxQhfWKpl-jy4YWVgMstseYZ27GKxZBEDvFBdNEEqFGxODQY3OoOug=s900-c-k-c0x00ffffff-no-rj',
      'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTm_aiW30pwksZazpRRNJvmg4eHATmNUsXFSg&s',
      'https://characterai.io/i/200/static/avatars/uploaded/2023/7/31/-oBDbKx8ZExLsRlZeYBUhQLPkqlvcLrZV23PyA3Qlk8.webp?webp=true&anim=0'
    ];

    const logos = [];

    images.forEach(src => {
      for (let i = 0; i < 3; i++) {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'moving-logo';
        container.appendChild(img);

        logos.push({
          el: img,
          x: Math.random() * (window.innerWidth - 140),
          y: Math.random() * (window.innerHeight - 140),
          dx: (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1),
          dy: (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1),
          size: 120
        });
      }
    });

    function animate() {
      logos.forEach((logo, index) => {
        logo.x += logo.dx;
        logo.y += logo.dy;

        if (logo.x <= 0 || logo.x + logo.size >= window.innerWidth) logo.dx *= -1;
        if (logo.y <= 0 || logo.y + logo.size >= window.innerHeight) logo.dy *= -1;

        for (let j = index + 1; j < logos.length; j++) {
          const other = logos[j];
          const hit = Math.abs(logo.x - other.x) < logo.size && Math.abs(logo.y - other.y) < logo.size;
          if (hit) {
            logo.dx *= -1;
            logo.dy *= -1;
            other.dx *= -1;
            other.dy *= -1;
          }
        }

        logo.el.style.left = logo.x + 'px';
        logo.el.style.top = logo.y + 'px';
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
